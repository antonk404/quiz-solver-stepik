services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    init: true
    stdin_open: true
    tty: true
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"
    restart: unless-stopped
